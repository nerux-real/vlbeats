name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-SDL2_ttf
            mingw-w64-x86_64-make

      - name: Configure
        shell: msys2 {0}
        run: |
          mkdir -p build-win
          cd build-win
          cmake .. -G "MinGW Makefiles"

      - name: Build
        shell: msys2 {0}
        run: |
          cd build-win
          mingw32-make

      - name: Prepare distribution
        shell: msys2 {0}
        run: |
          mkdir -p prod
          cp build-win/Lonkstalk.exe prod/VLBeats.exe
          cp build-win/LKPacker.exe prod/LKPacker.exe
          cp -r beatmaps prod/beatmaps
          cp -r skins prod/skins

          cd build-win
          ldd Lonkstalk.exe | grep '/mingw64/bin/' | awk '{print $3}' | while read -r dll; do
              cp -u "$dll" ../prod/
          done
          ldd LKPacker.exe | grep '/mingw64/bin/' | awk '{print $3}' | while read -r dll; do
              cp -u "$dll" ../prod/
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VLBeats-windows
          path: prod/