name: Build All Platforms

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-SDL2_ttf
            mingw-w64-x86_64-make
            mingw-w64-x86_64-git

      - name: Build Discord RPC (Windows)
        shell: msys2 {0}
        run: |
          git clone https://github.com/discord/discord-rpc.git
          cd discord-rpc
          mkdir build && cd build
          cmake .. -G "MinGW Makefiles" -DBUILD_SHARED_LIBS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          mingw32-make
          mingw32-make install

          if [ -d /mingw64/include/discord-rpc ]; then
            mv /mingw64/include/discord-rpc /mingw64/include/DiscordRPC
          fi

      - name: Configure
        shell: msys2 {0}
        run: |
          mkdir -p build-win
          cd build-win
          cmake .. -G "MinGW Makefiles"

      - name: Build
        shell: msys2 {0}
        run: |
          cd build-win
          mingw32-make

      - name: Prepare distribution
        shell: msys2 {0}
        run: |
          mkdir -p prod
          cp build-win/VLBeats.exe prod/VLBeats.exe
          cp build-win/LKPacker.exe prod/LKPacker.exe
          cp -r gamestuff/beatmaps prod/beatmaps
          cp -r gamestuff/skins prod/skins
          [ -f gamestuff/scores.db ] && cp gamestuff/scores.db prod/scores.db
          [ -f gamestuff/settings.ini ] && cp gamestuff/settings.ini prod/settings.ini

          ldd build-win/VLBeats.exe | grep '/mingw64/bin/' | awk '{print $3}' | while read -r dll; do
            cp -u "$dll" prod/
          done
          ldd build-win/LKPacker.exe | grep '/mingw64/bin/' | awk '{print $3}' | while read -r dll; do
            cp -u "$dll" prod/
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VLBeats-windows
          path: prod/

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake build-essential libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libdiscord-rpc-dev

      - name: Configure
        run: |
          mkdir -p build-linux
          cd build-linux
          cmake ..

      - name: Build
        run: |
          cd build-linux
          make

      - name: Prepare distribution
        run: |
          mkdir -p prod
          cp build-linux/VLBeats prod/VLBeats
          cp build-linux/LKPacker prod/LKPacker
          cp -r gamestuff/beatmaps prod/beatmaps
          cp -r gamestuff/skins prod/skins
          [ -f gamestuff/scores.db ] && cp gamestuff/scores.db prod/scores.db
          [ -f gamestuff/settings.ini ] && cp gamestuff/settings.ini prod/settings.ini
          chmod +x prod/VLBeats prod/LKPacker

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VLBeats-linux
          path: prod/

  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake sdl2 sdl2_image sdl2_mixer sdl2_ttf

      - name: Build Discord RPC (macOS)
        run: |
          git clone https://github.com/discord/discord-rpc.git
          cd discord-rpc
          mkdir build && cd build
          cmake .. -DBUILD_SHARED_LIBS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          make -j4
          sudo make install

          if [ -d /usr/local/include/discord-rpc ]; then
            sudo mv /usr/local/include/discord-rpc /usr/local/include/DiscordRPC
          fi

      - name: Configure
        run: |
          mkdir -p build-mac
          cd build-mac
          cmake ..

      - name: Build
        run: |
          cd build-mac
          make

      - name: Prepare distribution
        run: |
          mkdir -p prod
          cp build-mac/VLBeats prod/VLBeats
          cp build-mac/LKPacker prod/LKPacker
          cp -r gamestuff/beatmaps prod/beatmaps
          cp -r gamestuff/skins prod/skins
          [ -f gamestuff/scores.db ] && cp gamestuff/scores.db prod/scores.db
          [ -f gamestuff/settings.ini ] && cp gamestuff/settings.ini prod/settings.ini
          chmod +x prod/VLBeats prod/LKPacker

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VLBeats-mac
          path: prod/