name: Windows x64 Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSVC x64
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11

    - name: Install SDL packages
      shell: pwsh
      run: |
        vcpkg install sdl2:x64-windows
        vcpkg install sdl2-image:x64-windows
        vcpkg install sdl2-mixer:x64-windows
        vcpkg install sdl2-ttf:x64-windows
        vcpkg install sdl2-gfx:x64-windows

    - name: Configure
      shell: pwsh
      run: |
        cmake -B build `
          -A x64 `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows

    - name: Build
      shell: pwsh
      run: |
        cmake --build build --config Release

    - name: Copy DLLs
      shell: pwsh
      run: |
        $dlls = Get-ChildItem "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\*.dll"

        foreach($dll in $dlls)
        {
          Copy-Item $dll.FullName build\Release\
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Lonkstalk-Windows-x64
        path: |
          build/Release/Lonkstalk.exe
          build/Release/*.dll